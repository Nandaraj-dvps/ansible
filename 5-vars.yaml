- name: demo on task level variables
  hosts: localhost
  connection: local # it will not ask for username and password
  vars:
    COURSE: "Ansible"
    NAME: "Nanda"
    DURATION: "150HRS"
  tasks:
  - name: print information
    vars:
      COURSE: "DevSecOps"
    debug:
      msg: "Hi, I am learning {{ COURSE }}, Name is {{ NAME }}, Duration is {{ DURATION }}"